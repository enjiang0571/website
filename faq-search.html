<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ 搜索 - BeeFintech</title>
  <style>
    :root { --blue:#0b6bff; --ink:#07142f; --muted:#6f7f99; --line:#d8e7fb; --bg:#f3f8ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Inter, "Microsoft YaHei", Arial, sans-serif; color:var(--ink); background:linear-gradient(135deg,#fbfdff,var(--bg)); }
    a { color:inherit; text-decoration:none; }
    .header { position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between; height:72px; padding:0 7vw; background:rgba(255,255,255,.92); border-bottom:1px solid var(--line); backdrop-filter:blur(12px); }
    .logo img { width:150px; height:auto; }
    .btn { display:inline-flex; align-items:center; justify-content:center; min-height:40px; padding:0 18px; border:0; border-radius:7px; color:white; background:var(--blue); font:inherit; font-weight:800; cursor:pointer; box-shadow:0 12px 26px rgba(11,107,255,.18); }
    .ghost { color:var(--blue); background:#fff; border:1px solid var(--line); box-shadow:none; }
    main { max-width:1120px; margin:44px auto 80px; padding:0 24px; }
    .panel { padding:34px; border:1px solid var(--line); border-radius:10px; background:white; box-shadow:0 24px 70px rgba(36,97,168,.08); }
    .eyebrow { color:var(--blue); font-size:13px; font-weight:850; }
    h1 { margin:10px 0 8px; font-size:36px; letter-spacing:0; }
    p { color:var(--muted); line-height:1.8; font-weight:650; }
    .search { display:flex; gap:10px; margin:26px 0; }
    .search input { flex:1; height:48px; padding:0 16px; border:1px solid var(--line); border-radius:8px; font:inherit; font-weight:700; outline:none; }
    .list { display:grid; gap:12px; margin-top:24px; }
    .item { display:flex; align-items:center; justify-content:space-between; min-height:66px; padding:0 20px; border:1px solid var(--line); border-radius:9px; background:#fbfdff; font-size:17px; font-weight:820; }
    .empty { padding:38px; border:1px dashed var(--line); border-radius:10px; color:var(--muted); background:#fbfdff; text-align:center; font-weight:800; }
    .actions { display:flex; gap:12px; margin-top:28px; flex-wrap:wrap; }
  </style>
</head>
<body>
  <header class="header">
    <a class="logo" href="index.html"><img src="assets/brand/beefintech-logo@4x.png" alt="BeeFintech" /></a>
    <a class="btn" href="index.html#booking">预约演示 →</a>
  </header>
  <main>
    <section class="panel">
      <div class="eyebrow">FAQ Search</div>
      <h1>FAQ 搜索结果</h1>
      <p id="summary">正在搜索...</p>
      <form class="search" action="faq-search.html" method="get">
        <input id="queryInput" name="q" type="search" placeholder="搜索问题..." />
        <button class="btn" type="submit">搜索</button>
      </form>
      <div class="list" id="results"></div>
      <div class="actions">
        <a class="btn ghost" href="faq.html">返回 FAQ 列表</a>
        <a class="btn ghost" href="index.html">返回首页</a>
      </div>
    </section>
  </main>
  <script>
    const queryInput = document.getElementById("queryInput");
    const summary = document.getElementById("summary");
    const results = document.getElementById("results");
    const fallbackFaqs = [
      { id: "security", question: "平台如何保障数据安全？" },
      { id: "commission", question: "佣金结算如何保证准确？" },
      { id: "integration", question: "支持哪些对接方式？" },
      { id: "insurers", question: "系统支持哪些保险公司？" },
      { id: "pricing", question: "费用如何计算？" }
    ];
    const escapeHtml = (value) => String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    const q = new URLSearchParams(location.search).get("q")?.trim() || "";
    queryInput.value = q;
    summary.textContent = q ? `搜索关键词：${q}` : "未输入关键词，展示全部常见问题。";
    function render(items) {
      results.innerHTML = items.length
      ? items.map((item) => `<a class="item" href="faq-detail.html?id=${encodeURIComponent(item.id)}">${escapeHtml(item.question)}<span>›</span></a>`).join("")
      : `<div class="empty">无相关问题</div>`;
    }
    fetch(`/api/faqs?q=${encodeURIComponent(q)}`)
      .then((res) => res.ok ? res.json() : Promise.reject(new Error("FAQ search failed")))
      .then(render)
      .catch(() => render(q ? fallbackFaqs.filter((item) => item.question.includes(q)) : fallbackFaqs));
  </script>
</body>
</html>
